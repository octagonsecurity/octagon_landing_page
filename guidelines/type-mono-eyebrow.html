<!-- @dsCard group="Type" viewport="700x150" name="Mono & Eyebrow" subtitle="IBM Plex Mono for codes; uppercase tracked eyebrow." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .eyebrow { font-family: var(--font-heading); font-weight: 700; text-transform: uppercase; letter-spacing: .14em; font-size: 13px; color: var(--color-primary); display:flex; align-items:center; gap:8px; }
  .eyebrow::before { content:""; width: 22px; height: 3px; background: var(--color-primary); display:inline-block; }
  .mono { font-family: var(--font-mono); font-size: 15px; color: var(--text-strong); margin-top: 16px; }
  .mono .k { color: var(--text-muted); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="eyebrow">Get Octagon Secured</div>
  <div class="mono"><span class="k">LICENSE</span> EF0000848 &nbsp; <span class="k">PANEL</span> ZONE-04 &nbsp; <span class="k">STATUS</span> ARMED</div>
  <p class="meta">IBM Plex Mono · license #s, zones, panel IDs, monitoring data</p>
</body>
</html>
