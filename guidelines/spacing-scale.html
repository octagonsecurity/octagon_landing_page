<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid — space-1 … space-12." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--surface-page); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--color-primary); width: 100%; border-radius: 2px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 6px; white-space: nowrap; }
  .v { font-weight: 700; font-size: 11px; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:26px"><div class="bar" style="height:4px"></div><div class="lab"><span class="v">1</span><br>4</div></div>
    <div class="item" style="width:26px"><div class="bar" style="height:8px"></div><div class="lab"><span class="v">2</span><br>8</div></div>
    <div class="item" style="width:26px"><div class="bar" style="height:12px"></div><div class="lab"><span class="v">3</span><br>12</div></div>
    <div class="item" style="width:30px"><div class="bar" style="height:16px"></div><div class="lab"><span class="v">4</span><br>16</div></div>
    <div class="item" style="width:34px"><div class="bar" style="height:24px"></div><div class="lab"><span class="v">5</span><br>24</div></div>
    <div class="item" style="width:40px"><div class="bar" style="height:32px"></div><div class="lab"><span class="v">6</span><br>32</div></div>
    <div class="item" style="width:46px"><div class="bar" style="height:40px"></div><div class="lab"><span class="v">7</span><br>40</div></div>
    <div class="item" style="width:54px"><div class="bar" style="height:48px"></div><div class="lab"><span class="v">8</span><br>48</div></div>
    <div class="item" style="width:64px"><div class="bar" style="height:64px"></div><div class="lab"><span class="v">9</span><br>64</div></div>
    <div class="item" style="width:80px"><div class="bar" style="height:80px"></div><div class="lab"><span class="v">10</span><br>80</div></div>
  </div>
</body>
</html>
