<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Firm, low-spread, neutral. No colored glows." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 24px; background: var(--surface-subtle); font-family: var(--font-body); }
  .row { display: flex; gap: 26px; }
  .item { text-align: center; }
  .box { width: 110px; height: 70px; background: var(--surface-card); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)">xs</div><div class="lab">resting</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)">sm</div><div class="lab">card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)">md</div><div class="lab">hover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)">lg</div><div class="lab">overlay</div></div>
  </div>
</body>
</html>
