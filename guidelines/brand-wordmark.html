<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-body); display: flex; align-items: center; gap: 32px; }
  .lock { background: var(--surface-page); }
  .lock img { height: 84px; }
  .div { width: 1px; align-self: stretch; background: var(--border-default); }
  .eyebrow { font-family: var(--font-heading); font-weight: 700; text-transform: uppercase; letter-spacing: .14em; font-size: 14px; color: var(--color-primary); }
  .tag { font-family: var(--font-display); font-weight: 800; text-transform: uppercase; font-size: 30px; color: var(--text-strong); line-height: 1; margin-top: 6px; letter-spacing: -.01em; }
</style>
</head>
<body>
  <div class="lock"><img src="../assets/logo-footer.png" alt="Octagon Security wordmark"></div>
  <div class="div"></div>
  <div>
    <div class="eyebrow">Get Octagon Secured</div>
    <div class="tag">Don't get robbed—<br>call Rob.</div>
  </div>
</body>
</html>
