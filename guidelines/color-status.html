<!-- @dsCard group="Colors" viewport="700x170" name="System Status" subtitle="Monitoring states: armed, secure, warning, offline." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cell { border: 1px solid var(--border-default); border-radius: var(--radius-md); overflow: hidden; }
  .bar { height: 46px; }
  .meta { padding: 8px 10px; }
  .meta .t { font-family: var(--font-heading); font-weight: 700; font-size: 13px; color: var(--text-strong); text-transform: uppercase; letter-spacing: .03em; }
  .meta .h { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="bar" style="background:var(--status-armed)"></div><div class="meta"><div class="t"><span class="dot" style="background:var(--status-armed)"></span>Armed</div><div class="h">#BE1F24</div></div></div>
    <div class="cell"><div class="bar" style="background:var(--status-secure)"></div><div class="meta"><div class="t"><span class="dot" style="background:var(--status-secure)"></span>Secure</div><div class="h">#1F9D57</div></div></div>
    <div class="cell"><div class="bar" style="background:var(--status-warning)"></div><div class="meta"><div class="t"><span class="dot" style="background:var(--status-warning)"></span>Warning</div><div class="h">#E0A210</div></div></div>
    <div class="cell"><div class="bar" style="background:var(--status-offline)"></div><div class="meta"><div class="t"><span class="dot" style="background:var(--status-offline)"></span>Offline</div><div class="h">#9DA0A4</div></div></div>
  </div>
</body>
</html>
