<!-- @dsCard group="Type" viewport="700x180" name="Display — Saira Condensed" subtitle="Hero / wordmark feel. Black 800, uppercase, tight." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .d { font-family: var(--font-display); font-weight: 800; text-transform: uppercase; line-height: .98; letter-spacing: -0.01em; color: var(--text-strong); margin: 0; }
  .big { font-size: 60px; }
  .mid { font-size: 34px; color: var(--gray-700); }
  .red { color: var(--color-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <p class="d big">GET <span class="red">OCTAGON</span> SECURED</p>
  <p class="d mid">INSTALLED RIGHT THE FIRST TIME</p>
  <p class="meta">Saira Condensed · 800 · uppercase · tracking −0.01em · line-height .98</p>
</body>
</html>
