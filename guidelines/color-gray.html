<!-- @dsCard group="Colors" viewport="700x150" name="Concrete Gray" subtitle="Structure, bands, footers — logo gray #58595B at 600." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-default); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; }
  .sw span { font-family: var(--font-mono); font-size: 10.5px; line-height: 1.35; }
  .name { font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--gray-50)"><span class="name">50</span><span>#F5F6F7</span></div>
    <div class="sw" style="background:var(--gray-100)"><span class="name">100</span><span>#EDEEEF</span></div>
    <div class="sw" style="background:var(--gray-200)"><span class="name">200</span><span>#E0E1E3</span></div>
    <div class="sw" style="background:var(--gray-300)"><span class="name">300</span><span>#C6C8CB</span></div>
    <div class="sw" style="background:var(--gray-500);color:#fff"><span class="name">500</span><span>#76797D</span></div>
    <div class="sw" style="background:var(--gray-600);color:#fff"><span class="name">600 ·logo</span><span>#58595B</span></div>
    <div class="sw" style="background:var(--gray-800);color:#fff"><span class="name">800</span><span>#2A2B2E</span></div>
    <div class="sw" style="background:var(--gray-900);color:#fff"><span class="name">900 ·dark</span><span>#18191B</span></div>
  </div>
</body>
</html>
