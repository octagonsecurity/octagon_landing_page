<!-- @dsCard group="Colors" viewport="700x150" name="Brand Red" subtitle="Primary action / alert — #BE1F24. Spotlight, not a wash." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw span { font-family: var(--font-mono); font-size: 11px; line-height: 1.35; }
  .name { font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--red-50)"><span class="name">50</span><span>#FCEFEF</span></div>
    <div class="sw" style="background:var(--red-100)"><span class="name">100</span><span>#F8DADB</span></div>
    <div class="sw" style="background:var(--red-300)"><span class="name">300</span><span>#E08488</span></div>
    <div class="sw" style="background:var(--red-400);color:#fff"><span class="name">400</span><span>#CE4B50</span></div>
    <div class="sw" style="background:var(--red-500);color:#fff"><span class="name">500 ·primary</span><span>#BE1F24</span></div>
    <div class="sw" style="background:var(--red-600);color:#fff"><span class="name">600 ·hover</span><span>#A2191D</span></div>
    <div class="sw" style="background:var(--red-700);color:#fff"><span class="name">700 ·active</span><span>#831317</span></div>
    <div class="sw" style="background:var(--red-900);color:#fff"><span class="name">900</span><span>#3D090B</span></div>
  </div>
</body>
</html>
