<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Squared brand — tight corners. 2 / 4 / 6 / 10 / 16 / pill." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--surface-page); font-family: var(--font-body); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 64px; background: var(--gray-100); border: 1.5px solid var(--gray-300); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .lab b { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lab"><b>xs</b> 2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lab"><b>sm</b> 4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="lab"><b>md</b> 6px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="lab"><b>lg</b> 10px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lab"><b>xl</b> 16px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lab"><b>pill</b> 999</div></div>
  </div>
</body>
</html>
