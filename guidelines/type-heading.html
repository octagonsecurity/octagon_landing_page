<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  h2 { font-family: var(--font-heading); font-weight: 700; color: var(--text-strong); margin: 0; }
  .h2 { font-size: 30px; }
  .h3 { font-size: 21px; margin-top: 14px; }
  .h4 { font-size: 16px; margin-top: 12px; text-transform: uppercase; letter-spacing: .03em; }
  .rule { width: 56px; height: 3px; background: var(--color-primary); border: 0; margin: 10px 0 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <h2 class="h2">Why Choose Octagon</h2>
  <hr class="rule">
  <h2 class="h3">24/7 Monitoring & Rapid Support</h2>
  <h2 class="h4">Clean, Professional Installations</h2>
  <p class="meta">Saira · 700 · titles Title Case · h4 UPPERCASE +0.03em</p>
</body>
</html>
