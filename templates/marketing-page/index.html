<!-- @template name="Marketing Landing" description="Branded Octagon Security landing: hero, 3-up service features, and a conversion CTA band." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Octagon Security — Marketing Landing Template</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); color: var(--text-body); }
  .wrap { max-width: var(--container-max); margin: 0 auto; padding-inline: var(--gutter); }
  /* Hero */
  .t-hero { position: relative; color: #fff; overflow: hidden; }
  .t-hero__bg { position: absolute; inset: 0; background: url('../../assets/install-panel.png') center/cover no-repeat; }
  .t-hero__scrim { position: absolute; inset: 0; background: linear-gradient(100deg, rgba(11,11,12,.92), rgba(11,11,12,.55)); }
  .t-hero__inner { position: relative; padding-block: clamp(3.5rem, 9vw, 7rem); }
  .t-hero h1 { font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    font-size: clamp(2.4rem, 5.4vw, 4.4rem); line-height: .98; color: #fff; margin: 16px 0 0; max-width: 17ch; letter-spacing: -.01em; }
  .t-hero .accent { color: var(--color-primary); }
  .t-hero p { color: var(--gray-200); font-size: clamp(1rem,1.4vw,1.18rem); line-height: 1.55; max-width: 56ch; margin: 18px 0 28px; }
  .t-cta-row { display: flex; flex-wrap: wrap; gap: var(--space-4); }
  /* Features */
  .t-features { padding-block: var(--section-pad-y); }
  .t-head { max-width: 680px; margin: 0 auto var(--space-8); }
  .t-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
  .t-card { background: var(--surface-card); border: 1px solid var(--border-default);
    border-top: 3px solid var(--color-primary); border-radius: var(--radius-md);
    padding: var(--space-6) var(--space-5); box-shadow: var(--shadow-sm); }
  .t-card__ic { width: 52px; height: 52px; display: grid; place-items: center; border-radius: var(--radius-md);
    background: var(--red-50); color: var(--color-primary); margin-bottom: var(--space-4); }
  .t-card__ic svg { width: 26px; height: 26px; }
  .t-card h3 { font-family: var(--font-heading); font-weight: 700; font-size: var(--text-lg); color: var(--text-strong); margin: 0 0 8px; }
  .t-card p { font-size: var(--text-sm); line-height: 1.55; margin: 0; }
  /* CTA band */
  .t-band { background: var(--surface-dark); color: #fff; }
  .t-band__inner { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: var(--space-5);
    padding-block: var(--space-8); }
  .t-band h2 { font-family: var(--font-display); font-weight: 800; text-transform: uppercase; color: #fff;
    font-size: clamp(1.8rem, 3.4vw, 2.8rem); margin: 0; line-height: 1; }
  .t-band p { color: var(--gray-300); margin: 8px 0 0; }
  @media (max-width: 820px){ .t-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  const NS = 'OctagonSecurityDesignSystem_9e6033';
  const Ic = ({ n }) => React.createElement('i', { 'data-lucide': n });

  function Page() {
    const { Button, Badge, Eyebrow, SectionTitle } = window[NS];
    React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
    const features = [
      ['camera', 'Cameras & Surveillance', 'Clear video, remote access, and full coverage for home or business.'],
      ['bell-ring', '24/7 Monitored Alarms', 'Burglar alarms with real-time alerts and fast, dependable response.'],
      ['flame', 'Fire & Access Control', 'Code-compliant fire systems and keyless entry, installed and supported.'],
    ];
    return (
      <div>
        <section className="t-hero">
          <div className="t-hero__bg" /><div className="t-hero__scrim" />
          <div className="wrap t-hero__inner">
            <span className="os-eyebrow" style={{ color: '#fff' }}>Get Octagon Secured</span>
            <h1>Security Systems <span className="accent">Installed Right the First Time</span></h1>
            <p>Cameras, alarms, fire, access control, and structured cabling across Miami-Dade,
              Broward &amp; Palm Beach — installed cleanly and supported long-term.</p>
            <div className="t-cta-row">
              <Button variant="primary" size="lg" iconLeft={<Ic n="phone" />} href="tel:786-928-0986">786-928-0986</Button>
              <Button variant="secondary" size="lg" style={{ background: 'rgba(255,255,255,.06)', color: '#fff', borderColor: 'rgba(255,255,255,.5)' }}>Get a Free Quote</Button>
            </div>
            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', marginTop: '30px' }}>
              <Badge tone="solid" icon={<Ic n="shield-check" />}>Licensed &amp; Insured</Badge>
              <Badge tone="solid" icon={<Ic n="badge-check" />}>Free Estimates</Badge>
            </div>
          </div>
        </section>

        <section className="t-features">
          <div className="wrap">
            <div className="t-head">
              <SectionTitle eyebrow="What We Do" title="One Team for Complete Protection"
                subtitle="65+ years of combined experience, with clean installs and rapid support." align="center" />
            </div>
            <div className="t-grid">
              {features.map(([icon, title, body]) => (
                <div className="t-card" key={title}>
                  <span className="t-card__ic"><Ic n={icon} /></span>
                  <h3>{title}</h3><p>{body}</p>
                </div>
              ))}
            </div>
          </div>
        </section>

        <section className="t-band">
          <div className="wrap t-band__inner">
            <div>
              <h2>Don't get robbed—<span style={{ color: 'var(--color-primary)' }}>call Rob.</span></h2>
              <p>Free estimates · Licensed &amp; insured · Military discounts available</p>
            </div>
            <Button variant="primary" size="lg" iconRight={<Ic n="arrow-right" />} href="tel:786-928-0986">Get a Quote</Button>
          </div>
        </section>
      </div>
    );
  }

  const mount = () => {
    if (!window[NS]) return setTimeout(mount, 40);
    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  };
  mount();
</script>
</body>
</html>
