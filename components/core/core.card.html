<!-- @dsCard group="Components" viewport="700x600" name="Core Components" subtitle="Buttons, badges, status pills, inputs, cards, section titles." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); font-family: var(--font-body); }
  .stack { display: flex; flex-direction: column; gap: 22px; max-width: 660px; }
  .group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 18px; box-shadow: var(--shadow-xs); }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin: 0 0 10px; }
  .cardrow { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, StatusPill, Input, Card, SectionTitle } = window.OctagonSecurityDesignSystem_9e6033;
  const Ic = ({n}) => <i data-lucide={n}></i>;

  function Demo() {
    return (
      <div className="stack">
        <div className="panel">
          <p className="lbl">Buttons</p>
          <div className="group">
            <Button variant="primary" size="lg" iconLeft={<Ic n="phone"/>}>Get a Quote</Button>
            <Button variant="secondary">Learn More</Button>
            <Button variant="dark" iconRight={<Ic n="arrow-right"/>}>Call Us</Button>
            <Button variant="ghost">View Services</Button>
            <Button variant="primary" disabled>Disabled</Button>
            <IconButton label="Menu" variant="primary"><Ic n="menu"/></IconButton>
            <IconButton label="Search"><Ic n="search"/></IconButton>
          </div>
        </div>

        <div className="panel">
          <p className="lbl">Badges &amp; Status</p>
          <div className="group">
            <Badge tone="solid">Free Estimates</Badge>
            <Badge tone="outline" icon={<Ic n="shield-check"/>}>Licensed &amp; Insured</Badge>
            <Badge tone="neutral">Military Discounts</Badge>
            <Badge tone="soft">Fire Alarm</Badge>
            <StatusPill status="armed" />
            <StatusPill status="secure" />
            <StatusPill status="warning">Needs Service</StatusPill>
            <StatusPill status="offline" />
          </div>
        </div>

        <div className="panel">
          <p className="lbl">Inputs</p>
          <div className="group" style={{gap:'16px'}}>
            <div style={{flex:'1 1 200px'}}><Input label="Name" placeholder="Jane Doe" required /></div>
            <div style={{flex:'1 1 200px'}}><Input label="Phone" placeholder="(786) 555-0142" /></div>
          </div>
        </div>

        <div className="cardrow">
          <Card image="../../assets/svc-cameras.png" title="Security Cameras" accent interactive
                footer={<Button variant="ghost" iconRight={<Ic n="arrow-right"/>}>Learn More</Button>}>
            Clear video, remote access, full coverage.
          </Card>
          <div className="panel" style={{display:'flex',alignItems:'center'}}>
            <SectionTitle eyebrow="Why Choose Octagon"
              title="Installed Right the First Time"
              subtitle="65+ years of combined experience across South Florida." />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
